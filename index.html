<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Payoff Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --input-bg: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle { color: var(--text-secondary); font-size: 1rem; }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .layout { grid-template-columns: 380px 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .input-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.125rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--input-bg);
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--accent); }

        .chart-container {
            height: 350px;
            margin-bottom: 2rem;
            position: relative;
        }

        .table-section {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .table-wrapper {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            background: var(--input-bg);
            padding: 0.75rem 1rem;
            text-align: left;
            position: sticky;
            top: 0;
            color: var(--text-secondary);
            font-weight: 700;
        }

        td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }

        .warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.875rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Credit Payoff Visualizer</h1>
            <p class="subtitle">Interactive interest projection and amortization</p>
        </header>

        <div class="layout">
            <!-- Sidebar: Controls & Live Stats -->
            <div class="sidebar">
                <div class="card">
                    <div id="paymentWarning" class="warning">
                        ⚠️ Payment too low! Balance will grow forever.
                    </div>

                    <div class="input-group">
                        <label>Current Balance ($)</label>
                        <input type="number" id="balance" value="5000">
                    </div>
                    <div class="input-group">
                        <label>Interest Rate (APR %)</label>
                        <input type="number" id="apr" value="24.99" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Monthly Payment ($)</label>
                        <input type="number" id="monthlyPayment" value="250">
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Daily</div>
                            <div id="dailyAmt" class="stat-value">$0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Monthly</div>
                            <div id="monthlyAmt" class="stat-value">$0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Int</div>
                            <div id="totalInt" class="stat-value" style="color:var(--success)">$0</div>
                        </div>
                    </div>
                    
                    <p style="font-size: 0.75rem; color: var(--text-secondary); text-align: center;">
                        Payoff Time: <span id="payoffTime" style="color: white; font-weight: 600;">...</span>
                    </p>
                </div>
            </div>

            <!-- Main Panel: Graph & Table -->
            <div class="main">
                <div class="card">
                    <div class="chart-container">
                        <canvas id="payoffChart"></canvas>
                    </div>

                    <div class="table-section">
                        <h3 style="font-size: 1rem; margin-bottom: 0.5rem">Payoff Schedule</h3>
                        <div class="table-wrapper">
                            <table id="amortizationTable">
                                <thead>
                                    <tr>
                                        <th>Month</th>
                                        <th>Interest</th>
                                        <th>Principal</th>
                                        <th>Balance</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart;
        const inputs = ['balance', 'apr', 'monthlyPayment'].map(id => document.getElementById(id));
        const [balanceIn, aprIn, payIn] = inputs;
        const ctx = document.getElementById('payoffChart').getContext('2d');

        function format(v) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v); }

        function update() {
            const balance = parseFloat(balanceIn.value) || 0;
            const apr = (parseFloat(aprIn.value) || 0) / 100;
            const payment = parseFloat(payIn.value) || 0;
            const warning = document.getElementById('paymentWarning');

            // Quick Stats
            const daily = (balance * (apr / 365));
            const monthly = (balance * (apr / 12));
            document.getElementById('dailyAmt').textContent = format(daily);
            document.getElementById('monthlyAmt').textContent = format(monthly);

            if (payment <= monthly && balance > 0) {
                warning.style.display = 'block';
                return;
            } else {
                warning.style.display = 'none';
            }

            // Calculation Loop
            let currentBalance = balance;
            let totalInterest = 0;
            const data = [balance];
            const labels = ['0'];
            let html = '';
            let month = 0;

            while (currentBalance > 0 && month < 360) { // Max 30 years
                month++;
                const interestCharge = currentBalance * (apr / 12);
                totalInterest += interestCharge;
                let principal = payment - interestCharge;

                if (principal > currentBalance) principal = currentBalance;
                currentBalance -= principal;

                labels.push(month.toString());
                data.push(currentBalance);

                html += `<tr>
                    <td>${month}</td>
                    <td>${format(interestCharge)}</td>
                    <td style="color:var(--success)">${format(principal)}</td>
                    <td>${format(currentBalance)}</td>
                </tr>`;
            }

            document.getElementById('totalInt').textContent = format(totalInterest);
            document.getElementById('payoffTime').textContent = `${month} months (${(month/12).toFixed(1)} years)`;
            document.getElementById('amortizationTable').querySelector('tbody').innerHTML = html;

            renderChart(labels, data);
        }

        function renderChart(labels, data) {
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Remaining Balance',
                        data: data,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#64748b', callback: (v) => '$' + v }
                        }
                    }
                }
            });
        }

        inputs.forEach(i => i.addEventListener('input', update));
        update();
    </script>
</body>
</html>
